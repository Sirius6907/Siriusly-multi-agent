services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sirius
      POSTGRES_PASSWORD: sirius
      POSTGRES_DB: sirius
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirius -d sirius"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://sirius:sirius@db:5432/sirius
      PORT: "3100"
      SERVE_UI: "true"
      SIRIUS_DEPLOYMENT_MODE: "authenticated"
      SIRIUS_DEPLOYMENT_EXPOSURE: "private"
      SIRIUS_PUBLIC_URL: "${SIRIUS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - sirius-data:/sirius
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  sirius-data:
